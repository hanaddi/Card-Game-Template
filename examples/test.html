    <script>
        const slot1 = new Slot({
            pile: [],
            size: 1,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s1"),
            slotName: "s1",
            widthCard: 1,
        });

        const slot2 = new Slot({
            pile: [],
            size: 1,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s2"),
            slotName: "s2",
        });

        const slot3 = new Slot({
            pile: [],
            size: 1,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s3"),
            slotName: "s3",
        });

        const slot4 = new Slot({
            pile: [],
            size: 100,
            type: "list",
            domType: "list",
            domPile: document.querySelector("#s4"),
            slotName: "s4",
            widthCard: 7,
        });

        let offsetX = 0;
        let offsetY = 0;
        let cardMoving = null;
        function cardFuncOnPointerDown(ev) {
            let el = ev.target;
            while (!el.ctCard) {
                if (!el.parentElement) return;
                el = el.parentElement;
            }
            offsetX = ev.clientX;
            offsetY = ev.clientY;
            el.style["transition-duration"] = "0s";
            el.style["z-index"] = CT.Card.maxCards;
            el.style["animation"] = "none";
            el.setPointerCapture(ev.pointerId);
            cardMoving = el;
        }

        function cardFuncOnPointerMove(ev) {
            if (ev.pressure === 0) {
                cardMoving = null;
                return;
            }
            let el = ev.target;
            while (!el.ctCard) {
                if (!el.parentElement) return;
                el = el.parentElement;
            }
            if (el != cardMoving) return;

            const tx = ev.clientX - offsetX;
            const ty = ev.clientY - offsetY;
            el.ctCard.left ??= 0;
            el.ctCard.top  ??= 0;
            // el.ctCard.left = tx;
            // el.ctCard.top  = ty;
            el.style.left = (el.ctCard.left + tx) + "px";
            el.style.top  = (el.ctCard.top  + ty) + "px";
        }
        function cardFuncOnPointerUp(ev) {
            if (!cardMoving) {
                return;
            }
            let el = cardMoving;
            // el.style.removeProperty("left");
            // el.style.removeProperty("top");
            cardMoving = null;
            // let el = ev.target;
            // while (!el.ctCard) {
            //     if (!el.parentElement) return;
            //     el = el.parentElement;
            // }
            el.style.pointerEvents = "none";

            const targets = document.elementsFromPoint(ev.clientX, ev.clientY);
            // el.style.removeProperty("z-index");
            el.style.removeProperty("pointer-events");
            for (const target of targets) {
                if (!target.ctSlot) continue;
                if (el.ctCard.slot == target.ctSlot) continue; // to itself
                if (target.ctSlot.pile.length >= target.ctSlot.size) continue; // full

                
            
                const tx = ev.clientX - offsetX;
                const ty = ev.clientY - offsetY;
                el.ctCard.left += tx;
                el.ctCard.top  += ty;

                el.style.removeProperty("transition-duration");
                // el.style.removeProperty("animation");
                // el.ctCard.bBox = el.getBoundingClientRect();
                // CT.cardMove(el.ctCard, el.ctCard.slot, target.ctSlot);
                el.ctCard.move(target.ctSlot);
                return;
            }
            el.style.removeProperty("transition-duration");
            // slotTidyX(el.ctCard.slot);
            el.ctCard.slot.tidyX();
            el.style["z-index"] = el.ctCard.slotIndex;
            el.style.left = el.ctCard.left + "px";
            el.style.top  = el.ctCard.top  + "px";
            // el.style.removeProperty("animation");

        }

        let count = 0;
        document.getElementById("btn1").onclick = function (ev) {
            const card1 = new CT.Card({
                cardName: "card " + (++count),
                isOpen: Math.random() > -0.5,
            });
            card1.createDom();
            card1.dom.style["z-index"] = CT.Card.maxCards;
            card1.dom.addEventListener("pointerdown", cardFuncOnPointerDown);
            card1.dom.addEventListener("pointermove", cardFuncOnPointerMove);
            card1.dom.addEventListener("pointerup", cardFuncOnPointerUp);
            // CT.cardMove(card1, null, slot2);
            card1.move(slot2);
        };
        CT.Card.setCSS();

    </script>
