<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../cards.css">
    <script src="../cards.js"></script>

    <style>
        .card {
            /* transition-duration: 0s; */
            position: absolute;
            box-sizing: border-box;
        }

        .carddraw {
            /* animation: none !important; */
        }

        * {
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE 10 and IE 11 */
            user-select: none; /* Standard syntax */
        }
    </style>
</head>

<body style="background-color: darkolivegreen;">
    <div id="s1" class="deckempty cardplaceholder" style="--text-card: 'Set 1'; top: 100px; "></div>
    <div id="s2" class="deckempty cardplaceholder" style="--text-card: 'Set 2'; top: 100px; left: 200px;"></div>
    <div id="s3" class="deckempty cardplaceholder" style="--text-card: 'Set 2'; top: 100px; left: 600px;"></div>
    
    <div id="s4" class="deckempty" style="top: 300px; "></div>
    <div id="s5" class="deckempty cardplaceholder" style="--text-card: 'Set 5'; top: 300px; left: 800px;"></div>

    <button id="btn1">Draw</button>

    <script>
        CT.Card.cardWidth  = 100;
        CT.Card.cardHeight = 100;
        const slot1 = new CT.Slot({
            pile: [],
            size: 1,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s1"),
            slotName: "s1",
            widthCard: 1,
        });

        const slot2 = new CT.Slot({
            pile: [],
            size: CT.Card.maxCards,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s2"),
            slotName: "s2",
        });

        const slot3 = new CT.Slot({
            pile: [],
            size: 2,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s3"),
            slotName: "s3",
            widthCard: 2,
        });

        const slot4 = new CT.Slot({
            pile: [],
            size: 100,
            type: "list",
            domType: "list",
            domPile: document.querySelector("#s4"),
            slotName: "s4",
            widthCard: 7,
        });

        const slot5 = new CT.Slot({
            pile: [],
            size: 20,
            type: "list",
            domType: "slot-open",
            domPile: document.querySelector("#s5"),
            slotName: "s3",
            widthCard: 1,
            heightCard: 5,
        });

        let offsetX = 0;
        let offsetY = 0;
        let cardMoving = null;
        let slotsHover = new Set();
        function cardFuncOnPointerDown(ev) {
            let el = ev.target;
            while (!el.ctCard) {
                if (!el.parentElement) return;
                el = el.parentElement;
            }
            offsetX = ev.clientX;
            offsetY = ev.clientY;
            el.style["transition-duration"] = "0s";
            el.style["z-index"] = CT.Card.maxCards;
            el.style["animation"] = "none";
            el.setPointerCapture(ev.pointerId);
            cardMoving = el;
        }

        function cardFuncOnPointerMove(ev) {
            if (ev.pressure === 0) {
                cardMoving = null;
                return;
            }
            if (!cardMoving) {
                return;
            }

            const elsHover = document.elementsFromPoint(ev.clientX, ev.clientY);
            const slotsHoverNew = new Set();
            for (const elHover of elsHover) {
                if (elHover.ctSlot && elHover.ctSlot != cardMoving.ctCard.slot && elHover.ctSlot.pile.size < elHover.ctSlot.size) {
                    elHover.ctSlot.domPile.classList.add("deckallow");
                    slotsHoverNew.add(elHover.ctSlot);
                }
                if (elHover.ctSlot && elHover.ctSlot != cardMoving.ctCard.slot && elHover.ctSlot.pile.size >= elHover.ctSlot.size) {
                    elHover.ctSlot.domPile.classList.add("deckrestrict");
                    slotsHoverNew.add(elHover.ctSlot);
                }
            }
            for (const slotHover of slotsHover) {
                if (!slotsHoverNew.has(slotHover)) {
                    slotHover.domPile.classList.remove("deckallow");
                    slotHover.domPile.classList.remove("deckrestrict");
                }
            }
            slotsHover = slotsHoverNew;
            const el = cardMoving;

            const tx = ev.clientX - offsetX;
            const ty = ev.clientY - offsetY;
            el.ctCard.left ??= 0;
            el.ctCard.top  ??= 0;
            // el.ctCard.left = tx;
            // el.ctCard.top  = ty;
            el.style.left = (el.ctCard.left + tx) + "px";
            el.style.top  = (el.ctCard.top  + ty) + "px";
        }
        function cardFuncOnPointerUp(ev) {
            
            for (const slotHover of slotsHover) {
                slotHover.domPile.classList.remove("deckallow");
                slotHover.domPile.classList.remove("deckrestrict");
            }
            slotsHover.clear();

            if (!cardMoving) {
                return;
            }
            let el = cardMoving;
            cardMoving = null;
            el.style.pointerEvents = "none";

            const targets = document.elementsFromPoint(ev.clientX, ev.clientY);
            el.style.removeProperty("pointer-events");
            let isTidy = true;
            for (const target of targets) {
                if (!target.ctSlot) continue;
                if (el.ctCard.slot == target.ctSlot) continue; // to itself
                if (target.ctSlot.pile.size >= target.ctSlot.size) {
                    isTidy = false;
                    continue; // full
                }

                
            
                const tx = ev.clientX - offsetX;
                const ty = ev.clientY - offsetY;
                el.ctCard.left += tx;
                el.ctCard.top  += ty;

                el.style.removeProperty("transition-duration");
                // el.style.removeProperty("animation");
                // el.ctCard.bBox = el.getBoundingClientRect();
                // CT.cardMove(el.ctCard, el.ctCard.slot, target.ctSlot);
                el.ctCard.move(target.ctSlot);
                return;
            }
            el.style.removeProperty("transition-duration");
            if (isTidy) {
                el.ctCard.slot.tidy();
            }
            el.style["z-index"] = el.ctCard.slotIndex;
            el.style.left = el.ctCard.left + "px";
            el.style.top  = el.ctCard.top  + "px";

        }

        let count = 0;
        document.getElementById("btn1").onclick = function (ev) {
            const card1 = new CT.Card({
                cardName: "card " + (++count),
                isOpen: Math.random() > -0.5,
            });
            card1.createDom();
            card1.dom.style["z-index"] = CT.Card.maxCards;
            card1.dom.addEventListener("pointerdown", cardFuncOnPointerDown);
            card1.dom.addEventListener("pointermove", cardFuncOnPointerMove);
            card1.dom.addEventListener("pointerup", cardFuncOnPointerUp);
            card1.move(slot2);
        };
        CT.Card.setCSS();

    </script>


</body>

</html>
